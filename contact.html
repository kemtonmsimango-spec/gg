<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Atomic Build</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="section">
        <div class="container">
            <div class="contact-grid">
                <div>
                    <h1>Let's Build Something Great.</h1>
                    <p>Ready to upgrade your web presence? Fill out the form, and our team will get back to you within 24 hours to schedule a free strategy consultation.</p>
                    
                    <div style="margin-top: 40px;">
                        <h4 style="margin-bottom: 10px;">Direct Contact</h4>
                        <p style="margin-bottom: 5px;">📧 hello@atomicbuild.co.za</p>
                        <p>📍 Cape Town, Western Cape, South Africa</p>
                    </div>
                </div>

                <div class="card">
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john@company.com" required>
                        </div>
                        <div class="form-group">
                            <label for="package">Interested Package</label>
                            <select id="package" name="package" style="width: 100%; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit;">
                                <option>Basic Website (from R4,000)</option>
                                <option selected>Premium (R6,500)</option>
                                <option>Advanced (R8,500)</option>
                                <option>Hosting and Maintenance (R350/mo)</option>
                                <option>Custom / Not Sure Yet</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Project Details</label>
                            <textarea id="message" name="message" rows="5" placeholder="Tell us a bit about your business and goals..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-shake" style="width: 100%;">Submit Inquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
